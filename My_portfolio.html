        #nav {

            float: left;
            width: 11%;
            height: 100px;
            text-align: center;
            line-height: 100px;


        }

        #nav li a {
            text-decoration: none;
            color: black;
        }

        }

        }

            font-size: 20px;
            font-weight: 400;
        }

        #scroll_down {

            height: 60px;
            border: 8px solid white;
            border-radius: 35px;
            margin: 0 auto;
            margin-top: 200px;
        }

        #scroll_down_o {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 100%;
            margin: 0 auto;
            margin-top: 10px;
        }

        #scroll_down_text {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
        }

            height: 100%;

            height: 680px;

            height: 75%;

            width: 19%;
            height: 50%;
            float: left;
            margin: 0.5%;
        }

        img {
            width: 100%;
            height: 100%;
        }

        /* footer */
        footer {
            width: 100%;
            height: 140px;
            background-color: rgb(55, 55, 55);
            text-align: right;
            position: relative;
        }

        footer #footer_box {
            width: 98%;
            height: 40%;
            position: absolute;
            bottom: 10px;
        }

        /* 네비,메인타이틀 반응형 */
        @media only screen and (max-width: 1100px) {
            #nav {

            }
